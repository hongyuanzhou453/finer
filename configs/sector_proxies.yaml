    instruments:
      # 无场内算力指数 ETF（2023 年申报未发行）。515880 是算力基础设施
      # 主力代理，但已被 OPTICAL_MODULE 占用——F7 按 (KOL, ticker) 键
      # 立场槽，两个板块共用一只 ETF 会把独立观点合并成一条立场线，
      # 故算力取 AI 全链代理 159819，515880 退居 priority 2。
      - symbol: "159819.SZ"
        market: CN
        name: 人工智能ETF易方达
        priority: 1
      - symbol: "515880.SH"
        market: CN
        name: 通信ETF
