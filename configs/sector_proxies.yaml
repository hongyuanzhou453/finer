    instruments:
      # 无纯光模块场内 ETF；通信ETF(国泰) 光模块+服务器+光纤仓位 >78%，
      # 为市场公认代理（研究工作流 2026-07-11 核验）
      - symbol: "515880.SH"
        market: CN
        name: 通信ETF
        priority: 1
  SEMICONDUCTOR:
    sector_name: 半导体
    instruments:
      - symbol: "159995.SZ"
        market: CN
        name: 芯片ETF华夏
        priority: 1

  # ── researched（eastmoney 档案页核验，双复核待补）──────────────────
  NEW_ENERGY:
