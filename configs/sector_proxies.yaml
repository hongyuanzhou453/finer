# F2 sector→ETF proxy 映射 — 文件真值（file truth）
#
# 键 = entity_registry 的 sector 占位符号（储能→ENERGY_STORAGE）。
# F5 canonical runner 遇到 sector intent 时查此表：命中 → TradeAction 落在
# proxy ETF 上（metadata.sector_proxy 记录完整溯源）；未命中 → 拒绝
# reason=sector_proxy_not_configured。
#
# 编辑即生效（服务端 TTL 60s，enrichment/sector_proxy.py）。
# instruments 按 priority 升序取第一个匹配 market 的工具。
# symbol 必须是真实可交易代码（\d{4,6}.(SH|SZ|HK) 或 1-5 位大写字母），
# 占位符混进来会在加载时被拒。
#
# 代码核验：
# - 全部 17 instrument 已过真实 Yahoo 价格层（2026-07-12，各 62 交易日可取价）。
# - 10/16 板块已双对抗复核通过（ENERGY_STORAGE / GREEN_POWER / NEW_ENERGY /
#   OPTICAL_MODULE / COMPUTE_POWER / SEMICONDUCTOR / PHOTOVOLTAIC /
#   LITHIUM_BATTERY / BROKERAGE / PHARMA_INNOVATION）。
# - 6 板块（DEFENSE_MILITARY 1/2 通过、GOLD / HSTECH / ROBOTICS / AI_COMPUTING /
#   LIQUOR）复核 agent 因会话额度中断，但已过研究核验 + 价格层。
# 详见 docs/specs/2026-07-11-f2-sector-proxy-quality.md。
version: 1

proxies:
  # ── verified（研究 + 双对抗复核通过）────────────────────────────────
  ENERGY_STORAGE:
    sector_name: 储能
    instruments:
      - symbol: "159566.SZ"
        market: CN
        name: 储能电池ETF易方达
        priority: 1
  GREEN_POWER:
    sector_name: 绿电
    instruments:
      - symbol: "562550.SH"
        market: CN
        name: 绿电ETF华夏
